name: Convert Ruleset (Mihomo & Sing-box)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 5'  # UTC 22:00 (北京时间周六 6:00)

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Set build time
      run: echo "BUILDTIME=$(date -u -d '+8 hours' +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
      
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y wget curl

    - name: Download Cores (Mihomo & Sing-box)
      run: |
        # 1. Mihomo (Latest Stable)
        MIHOMO_VER=$(curl -s "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | grep '"tag_name":' | sed -E 's/.*"([^"]+)".*/\1/')
        wget -O mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/${MIHOMO_VER}/mihomo-linux-amd64-${MIHOMO_VER}.gz"
        gunzip mihomo.gz && chmod +x mihomo && sudo mv mihomo /usr/local/bin/

        # 2. Sing-box (Latest Release)
        SB_TAG=$(curl -s "https://api.github.com/repos/SagerNet/sing-box/releases/latest" | grep '"tag_name":' | sed -E 's/.*"v([^"]+)".*/\1/')
        wget -O sing-box.deb "https://github.com/SagerNet/sing-box/releases/download/v${SB_TAG}/sing-box_${SB_TAG}_linux_amd64.deb"
        sudo dpkg -i sing-box.deb
        rm sing-box.deb

    - name: Prepare Directories
      run: |
        mkdir -p publish_mrs
        mkdir -p publish_srs
        mkdir -p temp_json

    - name: Download Rules
      run: |
        wget -O awavenue-ads.yaml https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Clash.yaml
        wget -O ChinaASN.list https://raw.githubusercontent.com/ForestL18/rules-dat/mihomo/asn/combined/China-ASN-combined.list  
        wget -O cn.txt https://raw.githubusercontent.com/nekolsd/not-sing-geosite/release/clash/cn.txt

    - name: Convert for Mihomo (.mrs)
      run: |
        mihomo convert-ruleset domain yaml ./awavenue-ads.yaml ./publish_mrs/awavenue-ads.mrs
        mihomo convert-ruleset domain yaml ./cn.txt ./publish_mrs/cn.mrs

        for file in custom_direct.list custom_emby.list custom_reject.list; do
          if [ -f "$file" ]; then
            filename=$(basename "$file" .list)
            mihomo convert-ruleset domain text "./$file" "./publish_mrs/$filename.mrs"
          fi
        done

    - name: Convert for Sing-box (.srs)
      run: |
        # 使用 Python 显式生成 JSON
        python3 <<EOF
        import json
        import os

        def save_json(data, filename):
            with open(filename, 'w', encoding='utf-8') as f:
                json.dump(data, f, ensure_ascii=False, indent=2)

        # --- 任务 1: 处理 ChinaASN (内容为 IP CIDR) ---
        if os.path.exists('ChinaASN.list'):
            with open('ChinaASN.list', 'r', encoding='utf-8') as f:
                # 直接读取行，不需要去头去尾，因为文件里全是干净的 CIDR
                cidrs = [line.strip() for line in f if line.strip()]
            
            if cidrs:
                # 关键点：这里使用 ip_cidr 字段，而不是 ip_asn
                srs_data = {
                    "version": 1,
                    "rules": [{"ip_cidr": cidrs}]
                }
                save_json(srs_data, 'temp_json/ChinaASN.json')
                print("Generated JSON for ChinaASN (ip_cidr)")

        # --- 任务 2: 处理 Custom Lists (内容为 域名) ---
        custom_files = ['custom_direct.list', 'custom_emby.list', 'custom_reject.list']
        for list_file in custom_files:
            if os.path.exists(list_file):
                with open(list_file, 'r', encoding='utf-8') as f:
                    domains = [line.strip() for line in f if line.strip() and not line.startswith('#')]
                
                if domains:
                    filename = os.path.splitext(os.path.basename(list_file))[0]
                    # 关键点：这里使用 domain_suffix 字段
                    srs_data = {
                        "version": 1,
                        "rules": [{"domain_suffix": domains}]
                    }
                    save_json(srs_data, f'temp_json/{filename}.json')
                    print(f"Generated JSON for {list_file} (domain_suffix)")
        EOF

        # 编译所有 JSON
        for json_file in temp_json/*.json; do
          [ -e "$json_file" ] || continue
          filename=$(basename "$json_file" .json)
          echo "Compiling $filename..."
          sing-box rule-set compile --output "publish_srs/$filename.srs" "$json_file"
        done

    - name: Push to 'mrs' branch
      run: |
        cd publish_mrs
        [ -z "$(ls -A)" ] && touch .keep
        
        git init
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b mrs
        git add .
        git commit -m "Mihomo Rules: ${{ env.BUILDTIME }}"
        git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        git push -u origin mrs --force

    - name: Push to 'singbox' branch
      run: |
        cd publish_srs
        [ -z "$(ls -A)" ] && touch .keep
        
        git init
        git config --local user.name "github-actions[bot]"
        git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git checkout -b singbox
        git add .
        git commit -m "Sing-box Rules: ${{ env.BUILDTIME }}"
        git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
        git push -u origin singbox --force