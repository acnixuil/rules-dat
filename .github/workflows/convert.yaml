name: Convert List Files to MRS

on:
  workflow_dispatch:
  schedule:
    - cron: "0 17 * * *"

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout MetaCubeX/meta-rules-converter
        uses: actions/checkout@v4
        with:
          repository: MetaCubeX/meta-rules-converter
          path: convert
          
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Convert all .list files to .mrs
        run: |
          cd convert
          go run ./ textfile -i ../ -o ../ -b domain

      - name: Commit and push MRS files
        run: |
          git config user.name "${{ secrets.GIT_USER_NAME }}"
          git config user.email "${{ secrets.GIT_USER_EMAIL }}"
          git add ./*.mrs
          git commit -m "Converted list files to MRS format"
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}